<!doctype html>
<html lang="en">
  <head>
    <title>Adam Shannon | Photos</title>

    <link rel="stylesheet" href="photoswipe-4.1.2/photoswipe.css">
    <link rel="stylesheet" href="photoswipe-4.1.2/default-skin/default-skin.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="gallery.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-container">
          <h1 class="nav-title"><a href="../">Adam Shannon</a></h1>
          <ul class="nav-links">
            <li><a href="https://github.com/adamdecaf">GitHub</a></li>
            <li><a href="https://x.com/adamdecaf">X</a></li>
            <li><a href="https://keybase.io/adamdecaf">Keybase</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <h1>Photos</h1>

    <h2>2019</h2>
    <div class="my-gallery" itemscope itemtype="http://schema.org/ImageGallery" id="gallery-2019"></div>

    <h2>2018</h2>
    <div class="my-gallery" itemscope itemtype="http://schema.org/ImageGallery" id="gallery-2018"></div>

    <h2>2017</h2>
    <p>

    </p>
    <div class="my-gallery" itemscope itemtype="http://schema.org/ImageGallery" id="gallery-2017"></div>

    <h2>2016</h2>
    <p>
      Taken in Colorado on a week long trip.
    </p>
    <div class="my-gallery" itemscope itemtype="http://schema.org/ImageGallery" id="gallery-2016"></div>

    <!-- Required setup code, from website. -->
    <div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="pswp__bg"></div>
      <div class="pswp__scroll-wrap">
        <div class="pswp__container">
          <div class="pswp__item"></div>
          <div class="pswp__item"></div>
          <div class="pswp__item"></div>
        </div>
        <div class="pswp__ui pswp__ui--hidden">
          <div class="pswp__top-bar">
            <div class="pswp__counter"></div>
            <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>
            <button class="pswp__button pswp__button--share" title="Share"></button>
            <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>
            <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>
            <div class="pswp__preloader">
              <div class="pswp__preloader__icn">
                <div class="pswp__preloader__cut">
                  <div class="pswp__preloader__donut"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
            <div class="pswp__share-tooltip"></div>
          </div>
          <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)">
          </button>
          <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)">
          </button>
          <div class="pswp__caption">
            <div class="pswp__caption__center"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="photoswipe-4.1.2/photoswipe.min.js"></script>
    <script src="photoswipe-4.1.2/photoswipe-ui-default.min.js"></script>
     <script src="gallery.js"></script>
    </main>
  </body>
</html>
